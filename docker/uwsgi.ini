[uwsgi]
; Tanuki AI Backend - uWSGI configuration
module = ai_backend.app:app
master = true
processes = 2
threads = 2

; Socket for Nginx uwsgi_pass
socket = :5000

; Fall back to HTTP if running standalone (without Nginx)
; Uncomment the line below and comment out the socket line above:
; http = :5000

; Performance
harakiri = 120
max-requests = 1000
vacuum = true
die-on-term = true

; Logging
log-date = true
logto = /var/log/uwsgi/tanuki-ai.log

; Buffer size for large AI responses
buffer-size = 65535
post-buffering = 65535
