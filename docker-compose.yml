# Tanuki Stories - Docker Compose
# Production deployment with Nginx reverse proxy + uWSGI AI backend

services:
  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "${TANUKI_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - ai-backend
    restart: unless-stopped

  # Next.js application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.local
    expose:
      - "3000"
    restart: unless-stopped

  # Python AI backend served via uWSGI
  ai-backend:
    build:
      context: .
      dockerfile: docker/ai-backend.Dockerfile
    environment:
      - AI_UPSTREAM_URL=${AI_UPSTREAM_URL:-http://host.docker.internal:8000/v1}
      - AI_UPSTREAM_API_KEY=${AI_UPSTREAM_API_KEY:-EMPTY}
    expose:
      - "5000"
    restart: unless-stopped
