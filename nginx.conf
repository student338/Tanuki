# ─────────────────────────────────────────────────────────────────────────────
# Tanuki Stories – nginx reverse-proxy configuration
#
# This configuration puts nginx in front of both the Next.js application
# (port 3000) and the AI backend server (vLLM or llama.cpp, port 8000).
#
# Usage:
#   1. Copy or symlink this file to your nginx config directory:
#        sudo cp nginx.conf /etc/nginx/sites-available/tanuki
#        sudo ln -s /etc/nginx/sites-available/tanuki /etc/nginx/sites-enabled/
#   2. Adjust server_name, port numbers, and SSL settings as needed.
#   3. Test and reload:
#        sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

upstream tanuki_app {
    server 127.0.0.1:3000;
}

upstream tanuki_ai {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name localhost;

    # ── Next.js application ──────────────────────────────────────────────────
    location / {
        proxy_pass http://tanuki_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js streaming responses (story generation)
        proxy_buffering off;
        proxy_cache off;
    }

    # ── AI backend (vLLM / llama.cpp) ────────────────────────────────────────
    location /ai/ {
        proxy_pass http://tanuki_ai/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI responses can be streamed
        proxy_buffering off;
        proxy_cache off;

        # Large model responses may take time
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Static assets caching ────────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass http://tanuki_app;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Increase body size for CSV imports and other uploads
    client_max_body_size 10M;
}

