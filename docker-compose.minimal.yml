# Tanuki Stories - Docker Compose (Minimal)
# Node.js only — no Nginx reverse proxy, no uWSGI AI backend

services:
  # Next.js application (directly exposed)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.local
    ports:
      - "${TANUKI_PORT:-3000}:3000"
    restart: unless-stopped
